extends: default

# Machine-generated and vendored files are excluded. This repo does not control
# their formatting, and failing our own build over the specify CLI's output
# would make the gate meaningless.
ignore: |
  .specify/
  .claude/skills/

rules:
  line-length:
    max: 120
    level: warning
  document-start: disable
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
